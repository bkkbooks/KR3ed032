body:
  text: 産後上卷産後諸症總論凡病後起於血氣之虛脾胃之弱至産後而血氣脾胃之弱愈甚故丹溪論産後必當大補氣血為主雖有他症以末治之真確論也夫産後憂驚勞倦氣血暴虛諸症乘虛襲入或有氣不行勿專耗氣有食不消勿專消食有熱不可用芩連有寒不可用桂附用辛熱則新血流崩用苦寒則敗血凝滯至若虛而外感即見三陽表症不可大發汗恐亡陽也即見三陰里症不可遽用承氣恐竭陰也耳聾脅痛乃腎虛惡露之停休用柴胡囈語汗出乃元虛似邪之症勿同胃實厥由陽氣之衰難分寒熱非大補不能回陽而起危痙因寒血之損勿論剛柔非滋榮不能活絡而舒經如有乍寒乍熱發作有期症類瘧疾若以瘧論病甚難痊神不守舍言語無倫病似邪侵若以邪論危亡可待去血多而大便燥結蓯蓉加於生化湯莫投潤下之湯汗出甚而小便短澀六君子湯倍用參耆更加生津之劑人參生化湯頻灌可救産後之危長生活命湯屢用能蘇絶谷之人脫肛久瀉多是氣虛下陷補中益氣正宜口噤筋攣乃因血燥類風人參生化湯為最産戶入風而痛甚宜服羌活養榮湯玉門傷冷而不閉須洗床兔萸硫湯驚悸心忡生化定遠志似邪恍惚安神助歸脾因氣而滿悶中虛生化湯加木香為佐因食而吞酸惡食六君子湯加神麯為良一切破氣發汗吐下之法斷不可施於産婦先問惡露何如若塊痛未除未不可遽加參朮腹痛若止補中益氣湯無疑至汗出亡陽氣短喘促頻用生化湯固是從權如因大熱陰虛血崩血暈速煎生化湯原方乃為救急之法産後當補氣血為主用十全大補湯之類雖有他症以末治之如大熱煩躁等症炒黑薑加之或問乾薑辛熱何以用之曰乾薑味辛能引血至氣分而生血非神而明之孰能至此如胎前原有陰火症産後去血過多必大發煩躁汗出若大補血氣甚至熱極又當另用逍遙散以清肝火而養肝蓋因去血既多肝虛血燥之故不可拘泥氣血太虛之説乃用辛溫之劑生化論産後暴虛欲補恐惡露停滯欲攻又恐元氣愈虧惟行中帶補化舊生新為妙醫者每用四物湯竊謂地黃微寒而滯血芍藥酸寒而無補非産後之良劑也惟生化湯之藥産下即服消瘀塊而生新血正産小産俱宜然須預備為要生化湯歌曰芎歸與炙草炮薑桃仁炒五般名生化加減法更巧川芎三錢當歸八錢酒洗炙草五分炮薑五分桃仁十四粒炒去皮尖水煎加酒七茶匙稍熱服凡産後未進食之先頻服二三帖則下焦血塊速化而驟長新血自無暈厥等症胎前素來虛弱之人産後忽見危症及熱症等須服生化湯不拘帖數直至病退乃止若虛勞已甚及血崩形色壞脫汗多氣促者生化湯加人參三四錢自無滯血之症矣凡服生化湯如血塊痛者加紅花三錢疑是三分原抄者注肉桂二分益母草三錢治産後諸危症可通用加參生化湯一日一夜必須服三四帖或不拘帖數頻頻多服若照常數豈能接補將絶之氣血救危急之症也四味散當歸玄胡血竭沒藥各等分共為末每服二錢童便調服心膈寒倍加當歸心腹攝痛倍加沒藥惡露不快倍加血竭氣悶喘急倍加玄胡血塊論産後血塊乃孕成余血之積也因産婦勞力倦困睡臥太早衣服單薄肚腹欠溫以致血塊停滯作痛慎勿輕用峻劑多飲薑艾酒過於大熱則新血未免損失矣惟頻服生化湯以助血而行血外用熱衣暖服以護之可也勿用紅花以行之蘇木牛膝以攻之氣脹勿用烏藥香附以順之枳殼厚朴以舒之勿用枳實以下氣而定喘勿用芩連梔柏以退熱而除煩至於血枯大便實勿用承氣湯以下之下之則反結汗多小便澀勿用五苓以通之通之則愈祕執此治産是害産也惟以生化湯為妙又當加減治之大便不通加火麻仁陳皮之類誤下成脹滿加肉桂元胡之類十日以上肛門必有燥糞須膽導蜜導之法方列後惡露未盡有塊作痛名曰兒枕痛世多專消散然後議補又有消補混施不知舊血固當消新血又當生也若專消則新血不寧專生則原本舊血反滯惟芎歸桃仁善破舊血驟生新血佐以炮薑炙草引三味入肺肝生血利氣五味共劑真産後聖方名生化湯蓋因藥性用而立名也世用濟坤丹又名回生丹以攻血塊下胎胞雖見速效元氣損虧慎勿視為良劑或不得已而用以下胎胞只可一丸不可多服加參者多服亦無效膽導法用豬膽一具將汁傾入盞內再入生蜜一盅麻油一盅醋一盅水一盅攪勻同注尿胞內口上縛筆管一支將筆管插入肛門用力將尿胞一擠則藥入腸潤而糞下矣糞在肛門時亦用此方如急不得豬膽無之亦可蜜導法用蜜一二兩許火熬至滴水成硬珠將蜜傾入水中候硬取起搓成綻納肛門內糞即下糞逼肛門始用此方治兒枕痛方兒枕俗稱衣疙瘩痛無妨如用山楂須炒至黑色山楂二十四粒水盞半入砂糖一塊煎至八分溫服血暈論凡産婦分娩之後頭眩眼花昏迷不知人事謂之血暈其因有三一因勞倦甚氣竭神昏而然也一因血大脫而氣欲竭也一因痰火乘虛泛上神不清魂不隨神不往來而運機幾息也以上三者不論何項總宜急服生化湯以消塊而定痛化舊而生新則血生而元氣轉神漸清而有主矣須連服二三日定其昏亂而血即旺矣蓋芎歸有生化之功也若偏執古方以血暈為惡露上搶而迷輕用散血之藥誤認痰火而用消降不補之方或用蘇木等藥峻攻而破血及牡丹奪命等方敗血而損命害人甚矣臨盆之際預煎生化湯産下連服三帖並預燒稱錘三兩個於産母枕邊將醋韭汁傾盆內將燒紅稱錘淬入使氣味衝入産母鼻中自無血暈之症矣凡産畢不可即臥不可忿怒皆足以致此症一方用上好京墨煅七次醋淬七次研細末一二錢童便淡醋湯黃酒送下娩産下即服免血暈之症矣産後血搶上心神昏迷亂眩暈甚至血自口鼻湧出甚危症也方用男子發灰上好京墨血竭蒲黃隔紙微炒紅花等分水酒各半煎服童便更妙後二方一治法均不如生化湯為妥如服生化湯不應加參四五錢不應再加可加至一兩須連服以救危急生化奪命湯治三等血暈形色俱脫川芎二錢當歸四錢炮薑五分桃仁十一粒炒去皮尖炙草三分肉桂三分棗水煎服勞倦甚及血崩氣脫而暈速服二服即不省人事身半溫暖者速灌加參生化奪命湯以救之如不下咽用鵝毛刷喉中灌下即蘇汗多或形色脫而暈者急用一服後劑加人參二錢黃耆二錢決不可疑參為補而弗用痰火泛上而暈加橘紅四分虛甚加人參二錢肥人多痰加竹瀝半酒盞薑汁少許血塊痛甚以生化湯送益母丸一二個或送鹿角灰或送延胡索散俱效延胡索一錢肉桂六分共為末上藥用生化湯調服三等血暈總不用蘇木破血等藥此條據經效産寶校育注厥症論産後用力過多勞倦傷脾孤臟不能注於四旁故足冷而厥氣上行焉經雲陽氣衰於下則為寒厥是也宜服加參生化湯連進二服則氣血旺而神復厥症自止矣若服藥而猶渴用生脈散多加參以代茶助津而救臟燥也又有四肢逆冷瀉痢似陰症傷寒者不可用四逆湯必用倍參生化湯或加熟附子一片則可以止逆回陽而見參歸之功矣熱厥亦不可用白虎湯厥冷大脫非急方不能舉二氣以歸元非大補不能回陽而收神故速服加參生化湯此症由陰血虛陽氣亦虛陰陽兩虛故手足厥冷加參生化湯川芎三錢當歸八錢炮薑四分桃仁十粒炒去皮尖人參二錢炙草五分棗水煎連進數帖滋榮益氣復神湯血塊不痛者服此川芎二錢白朮二錢黃耆二錢人參三錢當歸三錢生地二錢麥冬一錢炙草四分陳皮四分五味子十粒熟附子五分水煎服汗多加麻黃根黑棗仁各一錢大便不通加肉蓯蓉錢半暈厥總論凡産婦暈厥二症類皆由氣血暴絶神將去而幾息苟非大方淨補何能挽其將絶之元神耶但暈症在臨盆之際其患尤急於厥症宜頻灌生化湯幾帖先補血分之虧使塊化血旺則神清而暈自止矣如無汗脫形脫氣促等症參耆不必加也厥症在分娩之後氣血兩竭宜用倍參生化湯消瘀塊生新血兼補氣血則厥止而神復又非偏補血分所能愈也要知有塊痛術耆莫可遽加如用痛反不止必至無塊作痛方可用術耆地黃為正分娩一二日血塊雖痛不止若産婦血氣虛脫或口氣漸冷或暈厥等勿論塊痛與否從權多用參耆生化湯以救危急産後血暈男人以手按住産婦兩耳急吹其口一二口即醒消塊散治産婦元氣虛瘀血逆上作暈人參一兩荊芥四兩炙草八錢川芎一兩澤蘭一兩共為末熱酒熱湯各半調服二錢若瘀血過多有昏憒等症宜四物湯加人參白朮黃耆如不應血脫也急用獨參一兩甚二兩水煎溫服可以固氣可以生血可以回生若身熱氣促者入童便一酒盞身寒氣弱者加熟附子一片血崩論産後血大來須審血色之紅紫視形色之虛實如血來紫色有塊乃當去敗之血也切不可止止之反作痛不可言如鮮紅之血大來乃是驚恐傷心心不能主血怒氣傷肝肝不能藏血倦勞傷脾脾不能統血以歸經而然也當以血崩治之先用生化湯幾帖則行中有補血寧靜而血旺矣崩症若形色脫或有汗或氣促宜服倍參生化湯以益氣則陽生而陰血旺矣血旺則血即不崩竭非棕灰髮灰散之可止也或産後半月外崩者又宜滋榮益氣止崩湯或升舉大補湯治之自愈有謂川芎當歸活血而不能止崩此昧原之論非明理之見也芎歸活血即能止崩血崩昏倦牙關緊閉但見其身心溫暖撬開口灌加參生化湯不拘帖數可活又用手在單衣外從心摸至腹再與暖厚衣服溫覆止崩生化湯川芎一錢當歸四錢炮薑四分炙草五分荊芥五分桃仁十粒炒去皮尖棗水煎服一方有肉桂五分忌食椒薑熱物並生冷如血色鮮紅大來加荊芥穗白芷各五分汗多氣促加人參三錢形脫亦加參兩手浮腫或右手脈絶加麥冬三錢五味子十粒滋榮益氣止崩湯川芎一錢當歸四錢人參二錢白朮二錢黃耆一錢熟地二錢陳皮四分升麻四分白芷四分荊芥穗四分炙草四分黃連三分或四分棗水煎童便服汗多加麻黃根一錢浮小麥一撮大便不通加肉蓯蓉一錢斷不可用大黃有氣不舒加木香末二分有痰加竹瀝薑汁貝母寒嗽加杏仁桔梗各八分知母一錢驚悸加柏子仁一錢棗仁一錢炒黑傷食加山楂八分砂仁五分斷不可用消耗無補之藥身熱倍參耆去黃連升舉大補湯人參三錢白朮三錢當歸三錢川芎八分生地二錢炙草升麻白芷陳皮黃連防風羌活各四分黃柏三分炒黃耆一錢炙棗水煎服煩躁乾渴加麥冬一錢五味子十五粒泄瀉去黃柏加澤瀉四分蓮子十粒有痰加半夏八分薑汁炒有痰及白沫加半夏蒼朮各二錢氣短似喘論産後呼吸短促有似於喘妄作痰火而用散氣化痰之藥誤人多矣夫肺乃受脾氣運化水穀上蒸於肺然後生滋血脈通調水道呼吸上下調和榮衛今産後血亡氣脫脾不運化而蒸肺故呼吸短促語言不緒有似於喘此不待診而知為虛症也蜀阜僧人治産後此症為痰火用枳殼青皮貝母香附芩柏等藥經傳歷年已久不知誤死多少人矣加參生化湯治産後即患氣促之症如有血塊不加朮耆川芎二錢當歸四錢炙草五分炮薑四分桃仁十粒炒去皮尖人參二錢棗水煎服一方有棗仁二錢炒黑須連服三帖然後可服後方續氣養榮湯産後氣短促無塊痛川芎二錢當歸四錢炮薑四分人參二錢黃耆白朮各一錢陳皮四分熟地二錢炙草四分棗水煎服一方有黑棗仁一錢如足冷加熟附子三五分汗多加麻黃根一錢半浮小麥一撮渴加麥冬一錢五味子十粒大便祕加肉蓯蓉二錢芝麻一撮麻仁亦可傷食加神麯一錢麥芽五分傷食肉加山楂五粒砂仁五分有痰加竹瀝一盞薑汁一匙或滋榮益氣復神湯亦可妄言妄見論産後妄言妄見由氣血兩虛而神魂無依也夫心藏氣而主血言乃心之聲也心有血則神存而言不妄發肝主魂而藏血目乃肝之竅也目得血而思視則瞳瞭而神正今産後暴竭心神失守故言語無倫肝魂無依眊瞭妄見況心為一身之主目乃百脈之官今虛症見於心目則十二官皆失職可知矣治此症當分産期遠近有無塊痛若兒方初下塊痛未除者當先服生化湯兩帖以化塊而定痛痛止然後復用加參生化湯以補之則自愈矣若産後日久亦無塊痛而形氣病勢俱有不足當大補為主以生氣養血安神定志服之充足其病自愈矣病家勿求速效醫家勿任去邪噴以法水驚以法尺率致不救豫屢治此症服藥至十數帖始效丹溪云虛病似邪祟又云欲泄其邪當補其虛先調其氣此次論諸症古人之確論也説者謂攻補不可同劑必攻邪盡立可用補誤矣是醫産後及年老人虛弱妄言妄見等症所當用心也寧神生化湯治産後塊痛未除妄言妄見未可術耆者川芎一錢當歸三錢炮薑炙草各四分茯神一錢人參二錢益智仁八分桃仁十二粒炒去皮尖柏子仁一錢陳皮二分龍眼肉五個棗水煎服加味滋榮益氣復神湯治産後塊痛已止妄言妄見者川芎一錢當歸三錢熟地二錢炙草四分黃耆一錢人參二錢茯神一錢柏子仁一錢益智仁一錢炒蓮肉八分去心龍眼肉八分陳皮三分麥冬一錢五味子十粒棗水煎服有痰加竹瀝一盞薑汁一匙大便不通加麻仁錢半切不可用大黃此症極虛服藥俱平穩未見大效候藥力充足頓除諸疾曾有服十二帖始見全效者血脫氣脫神脫總論産後崩者謂之血脫氣短似喘者謂之氣脫妄言妄見者謂之神脫三者雖有血陰氣陽之分其精散神去之狀無異症治雖比前暈症少緩總皆危症也若非厚藥急方頻進連服鮮克有濟誤作氣實痰火者皆非也血脫一症有塊痛當用加參生化湯塊痛已止用升舉大補湯少佐黃連以墜火使之寧血歸經也氣脫一症氣短似喘者用倍參補中益氣湯少佐熟附子以助參力攝氣歸元也神脫一症妄言妄見者用滋榮益氣復神湯少佐痰藥以清心而寧君王也傷食論新産之後形體勞倦脾胃俱傷是以務宜去膏粱遠厚味也食粥茹蔬乃為切當不知者惟慮産後之虛進以厚味強以飲食胃雖暫納脾轉輸遲以致食停痞塞惡食噯酸治法當以扶元為主補氣血健脾土助胃氣而養中為佐兼審所傷何物佐以消導之藥則脾氣暢輸轉易滯物行而胃思食矣蓋以溫補為主神麯消麵食以山楂砂仁消肉食以吳茱萸肉桂消冷食補消兼治無有不安庸醫但求速效惟進消化之藥反損真氣益加悶滿一劑不效又加峻藥一醫不效又易他醫先後互異輕症反危豈不惜哉産後誤用耗氣順氣之藥反增飽悶若用陳皮切不可用至五分以上人多不知其弊加味生化湯治産後血塊未消兼消食川芎二錢當歸五錢炮薑五分炙草四分桃仁十粒炒去皮尖水煎服傷麵食加神麯一錢麥芽一錢傷肉食加山楂砂仁各五分傷冷食加吳茱萸一錢肉桂五分虛甚加人參二三錢健脾消食生化湯治産後無塊痛宜服此方川芎一錢神麯八分當歸三錢人參五錢白朮一錢土炒麥芽八分炙草四分水煎服所傷加減如前如冷物停久脾胃虛甚藥不能消當以熱手按揉而並以炒麩尉之長生活命丹治産後傷食消導之藥也多服致令絶食並雜症誤消食絶者恐病人聞藥即嘔用鍋焦粉引胃耳人參一名長生草鍋焦一名活命丹人參三錢獨煎先用飯鍋內焦片黃色者佳黑者不堪用研細末以好酒或溫湯調送三匙引開胃口然後漸加參湯此方曾活數十人矣神效胃所養者谷日久不食胃空不受藥氣須用人參二三錢薑三片白朮一大撮水煎服忿怒論産後忿怒氣逆胸膈不舒血塊又痛宜用生化湯服時入木香末二分即愈若偏用烏藥香附枳殼香砂之類以散其氣則元損而胸膈反悶脹矣如怒後遂食胃虛停食脹悶者當審所傷何物照前加減分消之藥入生化湯內逐寒定痛無有不安慎勿輕用檳榔流氣等丸方散氣化食痰愈損真元也木香生化湯治産後塊痛未除又受氣惱川芎二錢當歸六錢炮薑五分炙草四分陳皮三分桃仁十粒炒去皮尖木香二分水煎溫服健脾化食散氣湯治産後無塊痛噯氣傷食者白朮一錢土炒當歸三錢炙草四分川芎一錢炮薑四分人參五分陳皮五分水煎服傷冷食脅下作痛加桂枝八分余照前加減如傷麵食加神麯是也傷氣傷食總論附脹滿産後忿怒傷食氣逆停食者必以消塊補氣補血為主佐以順氣氣順則鬱開而元氣不損佐以健脾消導則滯行而胃思食此正法也每見服散氣消導之藥愈增滿悶漸至少食卒致絶谷日久者亦用長生活命丹為藥也産後中滿臌脹大率傷食而誤消導致氣鬱而專順散又因多食冷物而停滯惡露又因血虛而大便燥結誤下愈脹治者但知傷食當消氣鬱當順惡露當攻便祕當下不顧産虛大傷胃氣氣不升降鬱積而成脹滿每致不救豈知微加消導於補劑中則脾強而所傷之食氣消散氣血兼行則大便自通而惡露自行每見誤用消氣消食之藥以致絶穀日久者用長生活命丹而更生又誤用消氣之藥而致成臌脹仍用大補益氣之劑不致夭亡治者先用人參二三錢煎送鍋焦粉引之以救絶谷然後漸加補脾之藥佐以消導按方施治可十全八九百試百驗誤耗益氣湯人參二錢虛者用四五錢白朮三錢茯苓錢半當歸三錢川芎八分白芍一錢大腹皮六分蘇梗五分木通五分陳皮四分厚朴四分蘿蔔子四分炙草三分木香三釐水煎服誤消健脾湯人參一錢白朮二錢茯苓一錢當歸二錢白芍一錢川芎七分大腹皮神麯各四分炙草五分水煎服腹脅痛或塊痛加砂仁五分傷麵食加麥芽五分傷冷食腸太痛加吳茱萸一錢養生化滯湯治産後大便不通誤用大黃等藥致成膨脹或腹內塊痛不止當歸四錢川芎一錢白芍一錢人參一錢白朮二錢茯苓一錢桃仁十粒炒去皮尖肉蓯蓉錢半去甲酒洗淨大腹皮四分陳皮三分香附三分炙草四分水煎服如脹甚倍人參白朮如血塊痛以本方送三消丸産後惡露成塊不下此句下似有脫字育注以上三方大率相同可以通用俱遵丹溪治脹加減方屢用屢驗常治服大黃而作脹者用參歸至半斤以上大便方通膨脹方退丹溪三消丸治婦人有死血食痰飲三等塊黃連一兩五錢吳茱萸汁炒一兩同益智仁炒五錢川芎五錢蘿蔔子五錢桃仁十粒炒去皮尖梔子五錢炒神麯五錢三稜四錢醋炒香附一錢童便浸炒山楂肉一錢共為細末蒸餅為丸食遠前湯送下五六十丸一方治惡露凝結成塊虛證百出腹痛身熱骨蒸時作時止似瘧或五心煩熱食少羸瘦或月水不調其塊在兩脅動作有聲嘈雜血暈等症用補中益氣湯去柴胡升麻加茯苓白芍煎送三消丸塊消而人不弱最妙類瘧論産後寒熱往來每日應期而至其症似瘧切勿用治瘧之方益氣血虛而寒熱並作元氣虛弱而外邪更侵必當滋榮益氣以退寒熱有汗當止則加麻黃根如頭痛有汗而不及手足乃孤陽絶陰之危症加地黃當歸之類可也經曰陰虛生內熱陽虛必外寒陰陽兩虛則寒熱往來有期者是瘧疾無期者是陰陽兩虛也舉止無常或一日二三度即明知感風寒頭痛身熱無汗亦於生化湯加羌活防風帶須蔥頭以散之切勿作瘧治而誤人也蓋此由氣血兩竭陽虛發寒陰虛發熱惟調補氣血則寒熱自除矣雖柴胡湯不可輕用勿以芩柏梔連退熱勿以檳榔草果截瘧有氣促者加參耆熱加參歸滋榮益氣扶正湯治産後半月內外類瘧寒熱有汗午後應期而至者川芎一錢白朮錢半麻黃根一錢當歸三錢炙草五分人參二錢熟地二錢陳皮四分去白黃耆一錢麥冬一錢浮小麥一撮水煎服一方有藿香八分青皮三分烏梅三個茯苓八錢無熟地陳皮麻黃根浮小麥名加味生化湯加減養胃湯治産後寒熱往來無汗頭痛類瘧如患瘧疾亦用此方加減調治川芎二錢當歸三錢藿香四分炙草四分茯苓一錢人參錢半半夏八分橘紅四分蒼朮一錢薑棗水煎服一方有青皮四分草果三個烏梅三個有痰加竹瀝半夏薑製薑汁虛人加河車丸如産後火瘧無汗不愈煎人參白朮膏以助藥力法用白朮一斤洗淨焙乾人參一兩入水六碗煎汁一碗半如此再煎五次共取汁九碗再煎至一碗磁器收貯每日服半酒盞白湯送下産後類傷寒二陽症論産後七日內外偶有發熱惡寒頭痛勿專作太陽症治之以麻黃湯寒熱頭痛脅痛勿專作少陽症治之以柴胡湯皆因産後氣血兩虛陰陽不合而然也且産婦血脫之後而重發其汗則虛虛之禍不可言仲景云亡血家不可發汗丹溪云産後不可發表二先生謂非産後無傷寒非謂柴胡等湯不可按經施治誠恐偏執專科輕産而泥成方致害人命也雖然知其真傷寒亦當於生化湯內加入芎薑等藥以散之可也又內經云西北之氣散而寒東南之氣收而溫之所謂同病而異治也非謂東南柔弱西北剛徑而異治也雖産後虛勞不可分南北概當重産而用補劑少佐以散劑雖有他症以末治之可也加味生化湯治産後三日外發熱頭痛川芎一錢當歸二錢炙草四分炮薑四分桃仁十粒炒去皮尖羌活四分防風五分水煎服二劑若身熱頭痛不除加白芷八分細辛三四分頭痛如破者加連須蔥頭五個虛人加人參二三錢汗多加參氣短多加參微喘加參渴而煩躁加人參麥冬五味子痰多加橘紅四分嘔吐加藿香三分薑三片乍寒乍熱發有常度加柴胡四分傷麵食加神麯傷肉食加山楂砂仁産後類傷寒三陰症論産後陽明經症見勿治以葛根湯白虎湯口煩咽乾便祕與譫語勿治以三承氣湯屢見妄下成臌誤導反結亦有血少而結下之而泄瀉不止虛之為禍不可勝言哉蓋産婦多由勞倦傷脾運化稽遲氣血枯竭腸腑燥結而然也豈可輕産而妄下乎以上三陰症並宜大料芎歸以補血少佐以參耆白朮可也然芎歸非服至數斤難取功效養心通幽湯治産後傷寒類三陰症大便祕者川芎二錢半當歸六錢炙草五分桃仁十五粒炒去皮尖陳皮四分麻仁二錢肉蓯蓉二錢水煎服汗多便實加黃耆二錢麻黃根一錢人參二錢口渴加麥冬一錢人參一錢腹滿咽乾便實加麥冬一錢枳殼八分人參一錢汗出譫語便實乃氣血兩竭心主失守宜養氣安神加茯苓棗仁遠志柏子仁各一錢人參二錢白朮二錢黃耆一錢産後傷寒總論産後傷寒雖見頭痛發熱或脅痛腰痛似乎外感而宜汗須念産後亡血而禁發汗惟於生化湯內量為加減大便祕結亦當思産後亡血而禁下瀉惟養正助血通滯為穩耳類中風論治産後氣血暴竭百體少血濡養而然也凡産後偶爾口噤牙關緊急手足筋脈攣搐狀似中風亦類痙癇者不可竟作中風痙癇治若妄用逐風消痰之劑是重虛産婦也蓋産婦氣血暴竭百體少血濡養而然也雖痰泛上以末治之夫衝脈為脈之海若血脈流利堅滑強徑則關節自然輕利矣當先服生化湯以旺新血如見危症三帖後急服人參益氣以救血脫可也如有痰有火少佐橘紅砂仁茯苓竹瀝薑汁然黃連知柏不可並用恐太寒也滋榮活絡湯治産後類中風口噤項強筋搐搐音觸牽制也川芎錢半當歸四錢熟地人參黃耆各二錢茯苓一錢天麻一錢麥冬一錢陳皮炙草荊芥防風羌活各四分黃連二分薑汁炒水煎服有痰加半夏曲七分竹瀝七分薑汁少許有汗加麻黃根大便閉祕加肉蓯蓉一錢渴加麥冬乾薑各八分驚悸加黑棗仁傷麵食加神麯傷肉食加山楂砂仁天麻丸治産後中風言語謇澀四肢不利精神恍惚天麻五錢防風五錢茯神一兩川芎一錢棗仁一錢炒黑人參遠志山藥柏子仁麥冬各一兩羌活七錢細辛膽星各八分半夏曲八錢當歸二兩石菖蒲八錢共為細末蜜丸桐子大硃砂為衣每服五十丸淡薑湯送下咳嗽論産後七日外感風寒咳嗽鼻塞聲重有惡露者宜生化湯加杏仁去皮尖桔梗有痰加天花粉勿用麻黃動汗如嗽而脅下痛勿用小柴胡湯如火嗽而有聲痰少面赤勿用涼藥凡嗽有痰有火者必調理産婦半月方可量用涼藥半月後還須重産丹溪云産後切不可發汗加味生化湯治産後感冒風寒鼻塞聲重當歸三錢川芎二錢杏仁十粒炮薑四分桔梗五分知母五分炙草四分薑水煎服有痰加天花粉有汗加人參寧肺生化湯治産後虛弱旬日內感風寒嗽聲而有痰或汗多或身熱頭痛當歸二錢川芎二錢杏仁十粒桔梗二分知母一錢人參一錢桑白皮二錢半夏七分橘紅三分薑水煎服虛人痰盛加竹瀝薑汁加味四物湯治産後半月外咳嗽有聲痰少川芎當歸生地白芍各二錢知母一錢訶子皮一錢瓜蔞仁一錢桔梗四分薑水煎服虛汗論內經云播體勞苦汗出於脾驚而奪精汗出於心有所恐懼汗出於肝凡分娩時出汗者皆由勞傷脾經驚傷心經恐傷肝經也産婦多兼此三者而汗不止也欲加斂汗之劑寧神則汗自止但血塊痛術耆未可遽加宜服生化湯二三帖消塊繼服加參生化湯以止汗可也若在分娩之後倦甚汗出形色又脫乃亡陽而汗脫又當從權速灌加參生化湯倍參以救急勿拘於塊痛而不加參也若産婦少有精神又當減參耆以除塊痛夫汗乃心之液也榮於內則為血發於外則為汗産婦亡血之後又多汗者由於受勞驚恐致令心傷神虛不能鎮守心液也治法當健脾胃而散水穀之精使之歸肺而滋榮衛則氣血歸源灌溉四旁不使妄行於外而為汗也卒症雖有盜汗自汗之分但當歸六黃湯又不可治産後盜汗並宜服加參生化湯及加味補中益氣湯可也若服參耆重劑而汗不止及頭出汗而不及腰足者皆危症也産後虛汗不止由産後陰血虛而陽氣偏盛故也經雲陽加於陰而發汗因而遇風而變為痙癇者有之加味補中益氣湯治産後虛極自汗不止當歸二錢人參二錢黃耆錢半炙草五分麻黃根一錢桂枝五分牡蠣一錢白朮一錢如塊痛不止加浮小麥一撮水煎服手足冷加熟附子一片乾薑四分渴加麥冬一錢五味子十粒血塊不痛加熟地三錢惡露加防風五分肥人多痰加竹瀝薑汁每晚服八味地黃丸七八十丸清湯下凡産後汗出多而變為類痙者口噤目直背強氣欲絶者宜速灌加參生化湯産後無汗而患類痙者中風者只用川芎一錢當歸二錢羌活八分棗仁一錢治之隨症加減如前經雲陽氣者精則養神柔則養血産後亡陽陽微不能養陰則筋急緊項強口噤牙緊筋搐類傷寒痙症慎勿作傷寒治之加減生化湯川芎一錢當歸二錢麻黃根一錢桂枝四分防風五分人參一錢炙草四分羌活四分附子四分羚羊角五分天麻一錢水煎服盜汗論盜汗者睡中汗出醒來即止猶盜賊瞰人睡而竊之也不可與自汗同治此由産後亡血陰虛而陽勝故也經曰陽加於陰則發汗是也治當兼用血分藥其當歸六黃湯寒而膩膈又非治産後盜汗之方也宜服止汗散止汗散人參二錢當歸三錢麻黃根一錢四分熟地三錢塊痛不用此味黃連五分酒炒浮小麥一撮水煎服一方用牡蠣末五分麥麩八兩炒黃為末每服三錢豬肉汁調服口渴兼小便不利論凡人日受水穀胃納之而脾運之上輸於肺肺散之至精至清之氣而為津為液其氣通於心稟火色而化為血下行膀胱而為小便今産後亡血又多汗勞倦傷脾不能與胃行其津液則是生化之機不運滲泄之令不行使上無津液流通而有燥結之症下氣不降而有小便閉澀之候治法當助脾益肺以升舉氣血則氣化流行陽降陰升使之水入經為血為液谷入胃長氣行脈自然津液充而燥渴除溺便自利矣所謂因其勞損而溫之益之因其留滯而濡之行之也若誤以燥渴為火而用芩連梔柏以降之認澀祕為滯而用五苓散等劑以通之為害多矣生津益水湯黃耆錢半人參生地麥冬各二錢五味子十粒當歸二錢茯苓一錢炙草升麻各四分葛根一錢水煎服汗多加麻黃根一錢棗仁一錢浮小麥一撮大便祕加肉蓯蓉一錢凡産後其大便或八九十日以上不通者皆因血少腸燥故也宜多服生化湯加麻仁以通潤之服芎歸至斤數自然通潤虛加人參三錢慎勿用大黃等下藥渴甚以生脈散代茶飲不可疑而不用此句據竹林寺女科祕旨卷七補育注産後遺尿凡産後遺尿由氣血大虛不能約束宜用八珍湯加升麻柴胡甚者加熟附子一片吳按曾有接生者以手入內探扶小兒損傷尿胞以致終身滲漏可不慎哉又有生理不順誤損尿胞膀胱者用參耆為君歸芎為臣桃仁茯苓陳皮為佐以豬羊尿胞煎湯煎藥須百服漸安薛氏補脬飲黃絹絲一尺碎剪白牡丹根皮為末白及末各一錢水煎至絹爛如飴服之靜臥不可作聲如作聲則不效抄本原無今據竹林寺女科祕旨卷七補育注類痙産後汗出多而變痙症口噤不開背強而直身反氣息如絶宜速服下方加減生化湯川芎麻黃根各一錢當歸四錢桂枝防風甘草羌活各五分人參二錢附子一片羚羊角天麻各八分産後中風無汗類痙宜芎歸活風湯芎歸活風湯川芎當歸各三錢防風羌活各五分棗仁一錢原抄本脫今據竹林寺女科祕旨卷七補育注泄瀉論産後泄瀉非雜症食泄洞泄濡泄濕泄水穀泄同治蓋産後泄瀉由氣虛食積與濕也然惡露未盡又難以驟補其氣而峻消急燥也當先用生化湯三劑加茯苓以利水道候血分生化然後加以消食補氣燥濕之藥可也若旬日之外泄瀉方以雜症論亦宜量人虛實而治之如痛下清水腹鳴米飲不化者寒瀉也糞色黃肛門痛者熱瀉也或傷脾瀉者自有噯氣吞酸泄屁氣如敗卵者也有脾瀉日久氣虛少食食下腸鳴腹急盡下其食而方快者治法寒則溫之熱則清之食積則健脾分利兼消補斯最善矣理中湯治産後脾胃虛泄瀉者人參白朮炙草乾薑水煎服脾腎兩虛者煎前湯送四神丸四神丸補骨脂四兩肉果二兩麵裹煨熟五味子一兩吳茱萸五錢湯泡去苦水共為細末用大棗百枚生薑四兩切片同煮去薑取棗肉同搗為丸腿足浮並頭面俱浮者急用八味丸或金匱腎氣丸不可泛用利水行氣之藥參苓朮附湯治産後虛泄眼昏不識人危症用此白朮三錢人參七錢熟附子一錢茯苓一錢或三錢加減生化湯治産後虛瀉血塊未除者川芎二錢當歸四錢炙草五分炮薑四分茯苓二錢桃仁十粒蓮子八粒去心水煎服健脾利水生化湯治産後虛瀉血塊已消者川芎一錢白朮二錢當歸二錢炮薑四分炙草五分茯苓錢半人參三錢肉果一枚煨陳皮五分澤瀉八分水煎服寒瀉加砂仁八分炮薑多用三五分熱瀉加炒黃連八分泄水腹痛米飲不化加砂仁山楂麥芽各六分瀉有酸噯臭氣加砂仁神麯各八分山楂五粒麥芽五分脾虛日久泄盡方快者以食積論亦加神麯麥芽山楂如弱甚形色俱脫必用丹溪參苓朮附湯大補方愈久瀉加升麻諸瀉宜加蓮子十粒水多加蒼朮以燥濕參苓蓮子飲治脾虛瀉年久不止者須用百帖甚則數百帖人參二錢白朮二錢茯苓一錢山藥一錢當歸錢半白芍一錢炙草四分陳皮三分升麻三分蓮子十二粒薑水煎服次煎即取蓮子細嚼藥湯送下大忌房事倘遇房勞則火動而腹復痛矣加炮薑五分此方治雜症脾瀉不止之方也即治産後泄瀉亦妙參苓蓮子飲治脾泄升舉大補湯治血崩二方活人多矣
