body:
  text: 產後下卷完穀不化論產後完穀不化因生產時勞倦傷脾而轉輸遲緩也夫水穀入胃必運於脾方散於肺而通調水道乃能致氣於四臟旁滋氣以養人者也今產後勞倦傷脾則沖和之氣不能運化而物完不化病名飧泄又有飲食太過脾胃傷損亦致完穀不化俗呼水穀痢但產後三日內血塊未消患此脾敗胃傷之症未可遽投術耆但服生化湯加益智仁木香砂仁少溫胃氣候塊消散方以參朮黃耆補氣健脾以肉果木香砂仁益智仁溫胃柴胡升麻以引胃中清氣澤瀉陳皮茯苓以利水斯為上策矣加味生化湯治產後三日內完穀不化亦治胎前素弱者川芎一錢當歸四錢炙草五分桃仁十粒炒去皮尖炮姜五分益智仁一錢茯苓錢半水煎服參耆生化湯治產後完穀不化血塊已散者川芎二錢當歸二錢益智仁一錢炒人參二錢炮姜四分茯苓一錢炙草五分白芍一錢白朮二錢蓮子八粒肉果一枚煨水煎服腹痛加砂仁八分瀉水多加澤瀉木通各八分渴加麥冬五味子各七分寒瀉加乾薑一錢木香四分食積糞黃加神麯麥芽各一錢肉積加山楂砂仁產後瀉痢日久胃氣虛弱完穀不化宜溫補胃氣用六君子湯加木香四分肉果一枚煎服痢疾論凡產後七日內外患赤白痢疾後重頻並難治欲調血行血而推蕩痢疾猶恐產後之元氣虛欲滋榮益氣而大補氣血反助痢物之滯結須當行不損元補不助邪惟生化湯減炮姜而代以木香茯苓則善消惡露兼行痢滯並治而不悖也再服加味香連丸俟二三日後看痢勢而後加減可保無虞產婦稟厚產期已過三十日可服生化湯加芩連樸芍等行積之藥加味香連丸亦可若產婦素弱雖產後月餘不可峻劑行積其七日內外有患褐色痢者即當加補加減生化湯治產婦七日內外患痢者川芎二錢當歸五錢炙草五分桃仁十二粒茯苓一錢陳皮四分木香二分水煎服白痢加砂仁六分炒研清血丸治紅痢神效產後七日內外者勿用寒性故也所謂清血丸者即香連丸為末蓮肉粉各一錢半如口噤赤白痢臍腹絞痛加行積藥凡產後三四日血塊已散痢疾少減照後開治法一產後久瀉元氣下陷大便不禁肛門如脫宜六君子湯加木香四分肉果一枚炮姜五分如完穀不化去炮姜一產後痢瀉黃色乃脾胃氣虛宜補中益氣湯加木香四分肉果一枚腹痛加砂仁八分瀉水多加澤瀉木通各八分渴加麥冬五味子瀉水寒加乾薑一錢木香四分食積糞黃加神麯麥芽肉積加山楂砂仁有的藥味無分量毓注一產後胃氣虛弱瀉痢完穀不化當溫補胃氣宜六君子湯加木香四分肉果一枚一產後傷飯食宜加參生化湯加神麯麥芽傷肉食加山楂砂仁一產後胃氣脾氣虛弱瀉痢四肢浮腫宜六君子湯加五皮散飲一痢瀉日久無後重者宜六君子湯加木香四分肉果一枚一產後赤白痢疾臍下痛宜用當歸二錢厚朴八分黃連八分肉果一枚煨炙草四分煎服一產後血痢日久不止者血虛也宜四物湯加人參荊芥一產後患痢羸因心腹絞痛宜用蔥白一寸石榴皮一錢黃連地榆各八分煎服一產後痢疾腹痛用溫湯布醮暖腹則止霍亂論凡產後忽患上吐下瀉腹臍疼痛煩亂不安名曰霍亂此由勞傷氣血臟腑虛損不能運化食物再感風寒所致此陰陽升降不順清濁紊亂於腸胃冷熱不調邪正相搏而然也宜生化六合湯生化六合湯治產後塊痛未除又患霍亂川芎二錢當歸四錢炮姜炙草陳皮各四分藿香四分砂仁六分茯苓一錢姜水煎服附子湯治產後無血塊患霍亂手足逆冷者白朮一錢當歸二錢陳皮乾薑丁香炙草各四分人參一錢熟附子五分姜水煎服如產後七日外霍亂用六合湯亦可也原注溫中散治產後無塊痛患霍亂吐瀉不止者人參當歸白朮厚朴各二錢乾薑八分茯苓三錢草蔻一錢姜三片共為末每服二錢粥飲調下此方無分量今據竹林寺女科秘旨卷八補原名溫中湯煎服毓注嘔逆不食胃為水穀之海水穀之精化力氣血以榮臟腑者也產後勞傷臟腑寒邪易乘虛入於腸胃則氣逆嘔吐而不食也宜加減生化湯加減生化湯川芎錢半當歸三錢炮姜五分砂仁五分炙草五分姜水煎服溫胃丁香散治產後七日外嘔逆當歸二錢白朮二錢人參一錢炮姜丁香陳皮炙草前胡藿香各四分姜水煎服安胃行血湯治產後七日內血塊未除胃氣不和嘔吐不止全不納穀者法當消塊痛佐以溫補胃氣之藥川芎一錢當歸四錢桃仁十粒炮姜五分炙草四分人參二錢茯苓二錢藿香四分砂仁四分陳皮四分姜水煎服有汗不用姜如服後胃和嘔止但氣弱少食宜服補中益氣湯方載流注論加減六合湯治同前方川芎一錢當歸二錢炮姜四分人參一錢山藥錢半茯苓錢半炙草四分藿香三分陳皮二分白蔻四分姜水煎服嘔止去白蔻石蓮散治產後咳嗽嘔逆吐怔忡目眩石蓮子一兩五錢去殼茯苓一兩丁香五錢共為末每服二錢米飲調下產後口渴產婦虛弱口渴氣少由產後血少汗多內煩不生津液生津益液湯人參麥冬茯苓各二錢大棗二枚小麥竹葉各六分瓜蔞根甘草各一錢如大渴不止加蘆根產後口渴條原脫今據竹林寺女科秘旨卷八補毓注水腫論產後患水腫手足俱浮皮膚光亮而色潤乃脾虛不能利水胃虛不能行水也必大補氣血為主佐以蒼朮茯苓白朮各一錢補脾如壅滿用半夏八分陳皮四分香附監之虛加人參一錢木通五分有熱加麥冬一錢黃芩一錢以清肺金補中健脾湯產後七日以外用人參三錢白朮二錢茯苓一錢白芍一錢厚朴四分陳皮五分紫蘇八分木通四分蒼朮四分大腹皮四分木瓜八分水煎服大便秘加肉蓯蓉一錢麻仁一錢如因寒邪濕氣傷表無汗而腫加姜皮三錢半夏五分紫蘇葉五分於補氣血方中以表汗五皮散方見前胎水不利門治產後風濕傷脾氣凝滯以致面目浮腫四肢腫脹喘滿者怔忡驚悸產婦驚憂勞倦去血過多以致心中躁動不寧謂之怔忡若惕然而驚如人將捕之狀謂之驚悸治此二症惟調和脾胃補養心血使之志定神寧氣舒心安而病自愈矣如分娩後血塊未消而患此者宜服生化湯以補血行血血旺則驚悸自除不必加定志安神劑如塊消痛止之後患此症宜服後藥加減養榮湯內去川芎麥冬加木香即歸脾湯川芎一錢當歸二錢茯苓棗仁炒黑人參麥冬遠志黃耆白朮各一錢陳皮炙草各四分龍眼肉八分姜水煎服虛煩加竹茹一團有痰加竹瀝薑汁養心湯治產後心血不寧驚悸不安黃耆一錢當歸二錢茯神遠志川芎各八分麥冬一錢棗仁一錢炒黑柏子仁一錢五味子十粒人參錢半炙草四分水煎服可與安神丸兼服安神丸黃連二兩炒生地三兩當歸三兩甘草五錢共為末蒸餅糊為丸桐子大辰砂為衣每服四十丸骨蒸凡產後骨蒸宜保真湯先用以清骨之劑清骨散作湯效更速凡骨蒸不論男女俱可服柴胡前胡胡連烏梅肉各二錢豬脊髓一條豬膽一具韭菜白十根長一寸切碎三味搗如泥入藥再搗為丸桐子大每服三四十丸白湯下如上膈熱食後服一方另將髓膽韭搗成泥加童便一酒盞熬成稀糊入藥再搗成丸加味大造丸治骨蒸勞熱如服前方不須服此紫河車一具製法載卷後人參一兩當歸一兩麥冬八錢銀柴胡六錢生地二兩胡連五錢山藥一兩石斛八錢黃柏七錢炒枸杞一兩共為末煉蜜丸保真湯治骨蒸勞熱黃耆一錢天冬一錢麥冬一錢人參一錢白朮一錢茯苓八分炙草四分川芎八分當歸二錢五味子十粒地骨皮八分白芍一錢枸杞一錢黃柏六分炒知母二錢生地二錢熟地二錢棗水煎服亦可作丸心痛心痛即胃脘痛以胃脘在心之下因傷寒氣及冷物而作痛因痛起於心俗呼為心痛夫心為君主之官主氣行血統馭臟腑血氣血盛則泰然安寧血不足則惕然驚悸豈可痛乎若真心痛則旦發夕死手足甲俱黑今產婦患此但當散胃中之寒物耳必用生化湯加散寒消食之藥無有不安若綿綿痛可按而止必問血塊已除否方可用補藥大抵因寒冷上攻則心痛下攻則腹痛治法亦相同也俱當於生化湯內加肉桂吳茱萸溫散可也加減生化湯川芎一錢當歸三錢炮姜五分肉桂八分炙草五分吳茱萸七分水煎服傷麵食加神麯麥芽傷肉食加山楂砂仁大便燥結加肉蓯蓉腹痛產後腹痛有血塊者只服生化湯調失笑散鹿角灰散塊消痛止矣風冷氣乘虛入腹作痛服加味生化湯加味生化湯川芎二錢當歸四錢炙草四分炮姜四分桃仁十粒桂枝七分水煎服傷麵食加神麯麥芽傷肉食加山楂砂仁如血塊未消痛未止加失笑散二錢玄胡索二錢失笑散又名一笑散治產婦心腹絞痛欲死或血迷竅不知人事或小腹急痛皆宜服之五靈脂炒蒲黃炒共為細末每服二錢熱酒調服服後急用十全大補湯調理如服後仍痛不止不可再服此氣血虛也急大補為主若手按之不可近者有瘀血也急用失笑散若元氣虛須用四君子湯加芎歸炮姜為當小腹痛產後虛中寒及飲冷下攻小腹作痛者又有血塊作痛者又有產後血虛臍下作痛者並宜加減生化湯塊痛即加減生化湯送玄胡索散一錢亦能治寒痛無血塊但小腹痛可按而少止者屬虛加熟地三錢玄胡索散玄胡肉桂等分為末遍身疼痛產後遍身疼痛者由分娩時百節開張血脈流散氣弱則經絡開瘀血留滯不散致筋脈引急骨節不利故腰背不能轉側手足不能動履或身熱頭痛若誤作傷寒而誤發其汗則筋脈動惕手足冷厥而變症百出矣宜服趁痛散趁痛散治遍身疼痛當歸二錢炙草三分黃耆一錢白朮二錢牛膝獨活肉桂各八分韭白八根姜水煎服茶調散治偏正頭痛薄荷川芎荊芥防風甘草細辛羌活青娥丸治腰痛胡桃仁二十枚破故紙八兩酒浸炒杜仲一斤薑汁炒去絲共為末蜜丸空心酸醋湯下此二方據靈驗良方彙編遍身疼痛條補毓注產後指節頭痛凡產後虛勞指節頭疼痛汗不止豬腎參耆湯人參黃耆各二錢生薑一錢淡豉一錢韭白一錢當歸三錢用豬腎二個先將豬腎煮熟取汁二碗煎藥八分盞溫服原抄本此條誤為頭痛方名亦異今據竹林寺女科秘旨卷八補毓注腰痛產後腰痛由女腎位系胞腰為腎府產時勞傷腎氣損動胞絡或虛未平復而風寒乘之乃致腰痛養榮壯腎湯當歸二錢獨活桂心川芎杜仲續斷各八分桑寄生二錢防風四分生薑三片水煎服如服二劑後痛不止者腎虛也加熟地三錢產後日久氣虛腰痛腎弱服加味大造丸方見前原注此方分量原缺今據竹林寺女科秘旨卷八補毓注淋症論產後患淋由產後虛熱客於脬中內虛則小便頻數淋澀作痛名曰淋症有赤白砂石諸淋並服後方茅根湯白茅根一兩赤茯苓五錢桃膠錢半葵子錢半鯉魚齒一百個滑石一錢煅甘草五錢紫貝二個瞿麥五錢石首魚頭一個或五錢焙乾為末另用燈心姜引湯煎入石首魚頭末空心溫服加減茅根湯治產後淋症小便痛血淋症白茅根一兩瞿麥一錢車前子冬葵子木通各一錢鯉魚齒一百個焙乾為末水煎服入鯉魚齒末空心溫服小便頻數論產後小便數者由脬內宿有冷氣因產發動冷風致令小便數也均屬虛寒經云益心之陽以消陰翳尤宜溫補益心收澀為治法也益智螵蛸散小便數或遺尿並治之益智仁三十七枚為末每服二錢米飲空心調下方名原為益螵蛸散於文理不通應視為益智螵蛸散為妥然方中無桑螵蛸疑原抄者筆脫也今擬改為桑螵蛸三十七枚益智仁二兩共為末毓注桑螵蛸散人參二兩黃耆二兩鹿茸炙去毛桑螵蛸三十個炒赤石脂二錢煅牡蠣二錢炒共為末每服二錢米飲調下方中鹿茸無分量原抄者脫毓注流注論產後惡露流於腰腎手足關節之間或漫腫或結塊腫痛至極肢體倦怠急用蔥熨法以治外內服加參生化湯以散滯血則未成者自消已成者自潰久則膿成宜托裡大補為主若腫起作痛起居飲食如常是病氣有餘形氣未損易治若漫腫微痛倦怠少食屬形氣病氣俱不足最為難治凡未成膿或成膿不潰者俱氣血虛也宜八珍湯憎寒畏寒陽氣虛也宜十全大補湯日晡內熱陰血虛也宜四物湯加參朮丹皮嘔逆胃氣虛也宜六君子湯加炮姜食少倦怠脾氣虛也宜補中益氣湯加升麻四肢逆冷小便頻數腎氣虛也宜補中益氣湯加益智仁此症若不補氣血不慎起居不節飲食未有得生者治宜留意焉此條據靈驗良方彙編所附胎產要訣產後流注條補錄並稍有改動以正本書原抄者之訛毓注蔥熨法用蔥一握炙熟搗爛作餅敷腫處上覆厚被以熨斗熨之加參生化湯方見前八珍湯即四君子湯加四物湯十全大補湯人參一錢白朮一錢茯苓一錢炙草四分當歸一錢白芍一錢熟地二錢川芎五分肉桂五分姜水煎服補中益氣湯歌曰黃耆歸術一錢均人參倍加草三分升柴五分陳皮七益智一錢外加論神仙回膿散方見乳癰門治產後流注日久成膿用此方通其膿若未經補血氣未旺此方又不可遽服也回毒散乳癰未潰時服毒從大便出虛人不宜用大黃三錢白芷六錢乳香沒藥穿山甲蛤粉炒木香另研各五分共研末人參二錢煎湯調前藥末服此方據靈驗良方彙編乳癰條補毓注陰蝕五疳論凡婦人產後陰戶生瘡名曰陰蝕或痛或癢如蟲行之狀膿汁淋漓陰蝕幾盡者由心腎煩郁胃氣虛弱以致氣血留滯而然也經云諸痛癢瘡皆屬心火法當補心而養肺胃外以熏洗藥治之斯愈矣千金療蝕方川芎當歸白芍地榆甘草各一兩水五升煎至二升去渣熱熏之溫洗之日三次夜一次即愈矣金銀散蒲黃一斤水銀一兩二味研勻擦之即愈硫黃散治疳蝕陰戶及下部五臟硫黃不拘多少研為細末取東南向桃枝三七條將枝頭捶散以綿裹之黏硫黃末於上向瘡黏之令末黏瘡上又換又貼再截短竹筒一個納入陰戶內將桃枝上藥燒之納竹筒內向陰戶熏之即愈一方用肥豬肉十斤水煮以汁浸瘡冷再熱日浸二三次即愈又方用蝦蟆兔糞等分為末敷瘡即愈產後陰翻產後陰翻因產戶燥熱翻成反花治法用澤蘭四兩煎水洗二三次再入枯礬煎洗即愈無乳論產後有乳婦人之常也然有血氣壯而壅閉不行者法當疏而通之又有氣血虛而阻滯不行者法當補而潤之蓋婦人之乳資於衝脈任脈及足陽明胃經若素有衝任之疾與夫胃氣不利者乳汁乃少面必黃色乳子怯務服滋榮養血兼通利可也若乳汁素少生質如此雖服通乳之劑亦弗效加味玉露飲治乳汁不行身體壯熱頭暈痛屬虛者服此人參二錢茯苓一錢白芍一錢甘草六分當歸六分川芎六分桔梗一錢水煎服湧泉散治婦人氣壅乳汁不行瞿麥穗麥冬龍骨煅穿山甲蛤粉炒王不留行等分為末每服一錢熱酒調服飲豬蹄羹再以木梳梳二乳三四十梳一方有鹿角灰無龍骨更妙豬蹄羹方豬前蹄一隻通草四兩即木通切片做花卉者乃通脫木非通草也須辨水一斗煎至五升飲湯兼服前散即通乳癰瓜蔞乳沒散治產後乳生癰未成膿痛不可忍與胎前乳癰同治瓜蔞一個連皮捶碎金銀花三錢當歸三錢白芷一錢青皮五分乳香五分沒藥五分水煎服瓜蔞散治乳癰已潰未潰俱效並治血疝當歸五錢甘草五錢乳香一錢沒藥一錢瓜蔞一個連皮捶碎水酒各半煎服渣搗爛敷乳上即愈
