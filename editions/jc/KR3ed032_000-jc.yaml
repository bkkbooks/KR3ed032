body:
  text: 附錄竹林產後五急十九危症產後五急一分娩兒下即血崩暈去形脫宜用加味生化湯川芎二錢當歸四錢薑炭一錢四分桃仁十粒炙甘草五分荊芥五分人參加至五六錢水煎服或分娩兒下汗多倦甚前方加人參三四錢或分娩兒下無力送胞倦怠前方用人參二三錢或分娩兒下即時暈昏形脫前方用人參五錢二產後勞倦形色脫前方倍參四錢加黃耆一錢熟地二錢如塊痛二味不用加熟附子四分三產後血崩形色脫前方倍參五錢加荊芥四分血塊不痛可服升舉止崩復神湯升舉止崩復神湯白朮三錢當歸三錢熟地二錢人參四錢黃耆一錢黃連七分炙草升麻陳皮白芷荊芥各四分熟附子三分水煎服四汗多形色脫倍參生化湯去炮姜加麻黃根黑棗仁黃耆各一錢熟地三錢浮小麥一撮防風五分五氣短似喘倍參生化湯人參只用二錢加沉香末二分陳皮香附各三分以上五症如兼見他症照後開加減法渴加麥冬一錢五味子五粒驚悸加棗仁益智仁各一錢炒瀉加茯苓澤瀉各八分大便燥結加肉蓯蓉錢半傷飯麵食加神麯八分麥芽五分傷肉食加山楂砂仁各五分小便不禁加益智仁二分寒嗽加杏仁十粒桂枝五分虛嗽加麥冬錢半瓜蔞仁八分有痰加天花粉八分橘紅四分氣虛多痰加竹瀝薑汁食少加白朮產後十九危症並以加參生化湯為主加減治之加參生化湯人參三錢川芎一錢當歸二錢炮姜四分炙草五分桃仁十粒水煎服一產後勞倦傷脾不思穀食前方加白朮一錢如血塊痛去此味加陳皮升麻各四分二產後頭痛身熱自汗倦怠前方加黃耆一錢如血塊痛不用此味三產後感寒身熱頭痛嗽聲重有汗有痰前方加天冬一錢杏仁十粒天花粉麻黃根地骨皮各一錢桔梗四分頭痛甚加連須蔥頭五個四產後先寒後熱或朝熱夜熱每日應時發熱類瘧有汗前方加軟柴胡八分青皮三分烏梅二個汗多加麻黃根一錢汗多不至足加熟地二錢食少加黃耆白朮各一錢陳皮四分如塊痛則熟地術耆俱不用五妄言妄見邪祟前方加茯神一錢遠志八分棗仁一錢陳皮四分麥冬五分六足冷發厥一日二三次厥者前方加白朮熟地各一錢熟附子四分七產後身熱有汗大便不通前方加麻黃根一錢麻仁地骨皮肉蓯蓉各三錢慎勿用大黃下之八產後有汗潮熱睡中妄言前方加麻黃根地骨皮各八分九身熱有汗脅痛或潮熱前方加麻黃根一錢黃耆一錢桂枝七分柴胡八分臍下痛可按而止加熟地二錢慎勿用小柴胡湯十產後有汗小便多前方加麻黃根一錢麥冬五分葛根黃耆各五分五味子十粒十一有汗泄瀉前方加麻黃根一錢石蓮子十粒肉蔻一枚麵裹煨熟去油用十二泄瀉危困宜服丹溪醫案大補方十三傷食誤服消耗藥反成膨脹宜服丹溪醫案大補方十四大便不通誤服大黃成膨脹宜服丹溪醫案大補方十五忿怒誤服耗氣藥成膨脹宜服丹溪醫案大補方丹溪醫案大補方人參三錢當歸三錢白朮三錢白芷一錢茯苓一錢澤瀉八分厚朴五分紫蘇五分陳皮四分木香三分大腹皮六分蘿蔔子六分川芎一錢水煎服傷食加神麯並傷肉食加山楂砂仁十六傷食心腹痛或脅痛誤服消導藥以致絕谷獨用人參三錢姜一片水煎調鍋焦服引開胃氣十七血崩日久不止宜服升舉大補湯方見血崩門十八子宮不收產門不閉之脫症宜服倍參生化湯原方十九產後神昏形脫有汗於加參生化湯內去炮姜並忌食薑蔥以上十九危症並補氣血為主問無血塊痛即服之又明產後二十九症醫方一產後血塊痛宜服生化湯加紅花肉桂連服幾帖即時塊散而痛止矣血旺自精神矣雖少壯之婦產後無病亦服生化湯幾帖以補血而散瘀大有益焉其產母腹外用烘暖衣服護任使之和暖則血塊宜散雖暑月亦宜保護或兼送益母丸一丸或鹿角灰一錢三方得一而安慎勿用蘇木稜蓬京三稜蓬莪朮等峻厲之藥山楂雖行氣行血亦不甚峻然弱人服之亦有害總不宜多用耳二產後去血過多或勞倦昏暗血暈頻服生化湯幾帖服至產婦精神方止如遇血暈形色將脫或汗多虛脫宜加參四五錢服之慎勿視為惡露搶心妄投破血之藥以害人三胎衣不下宜服生化湯兩帖初煎即送益母丸一丸次煎又送一丸外用烘暖衣服護腹冬日慎勿坐淨桶並赤身久候胎衣恐嚴冬寒冷損傷產母必扶上床被覆以火籠暖和其身兼服生化湯助血胎衣自下四產後頭痛身熱惡寒雖明知感冒風寒只宜服生化湯連進兩三帖致熱退痛止方已不須用他藥蓋川芎炮姜性辛而散邪慎勿用柴胡升麻等藥以表其汗致虛產母如服三四帖後頭痛發熱如故加連須蔥頭四五個或用蔥頭放白鱟內吃亦可放鯽魚湯內飲之亦可五產後乍寒乍熱或頭痛脅痛亦服生化湯兩三帖不愈加桂枝七分以散寒邪有塊加木香一分切勿認為脅痛而用柴胡等湯以表汗也六產後感寒寒氣上攻則心痛下攻則腹痛復兼血塊痛宜服生化湯加桂枝三分以定痛如二帖不愈加吳茱萸七分或姜三薄片入生化湯內以助血若獨用諸熱藥以攻寒其痛雖止恐去血過多致虛產母慎勿用汗吐下之藥七產後夜熱或寒熱往來每日如期類瘧宜服生化湯幾帖則寒熱自除如汗多氣虛服加參生化湯慎勿用常山草果等藥八感冒寒邪心下痞滿只宜服生化湯加陳皮五分桔梗五分白蔻五分木香二分慎勿用破氣藥九風寒咳嗽身熱宜服生化湯加杏仁十粒知母一錢天冬一錢甘草四分桔梗五分有痰加橘紅四分天花粉八分有汗加人參慎勿用散氣藥十傷食宜服生化湯加神麯麥芽各一錢五分傷肉食加山楂砂仁各四分傷冷食冷飲加吳茱萸一錢桂枝五分傷寒食脅痛加肉桂七分切不可專用消食藥以損氣血一婦人服山楂消血塊而死十一忿怒胸膈滿悶生化湯加木香二分煎服慎勿用烏藥香附厚朴枳殼枳實消損元氣十二大便不通生化湯加肉蓯蓉二錢日服二三帖以助血血旺則便自通矣另研芝麻三兩為末加米一升作粥時時食之慎勿用大黃等藥若結燥日久多用大黃反成膨脹十三產後去血過多或汗多小便澀少或小便閉結生化湯加生脈散服之人參麥冬五味子此三味即生脈散慎勿用五苓等方如服藥不通外用蔥熨法用蔥十頭線縛切如一指厚片放臍上艾火灸之十四產後血氣虛胃寒小便多失禁或遺尿生化湯加益智仁八分煎服十五泄瀉生化湯加茯苓一錢澤瀉七分石蓮子六錢一云十粒或另用糯米蓮子各半入茯苓煮粥食之泄瀉形脫神倦生化湯加人參十六失血多心神失守妄言妄見生化湯加茯神棗仁柏子仁各一錢遠志八分慎勿用降火消痰藥致害產母更有法水噀之法尺驚之為害不小如汗脫生化湯加人參十七足冷發厥血塊又痛生化湯加乾薑五分服二二帖後再服加參生化湯十八產後痢疾不論紅白生化湯去炮姜加木香二分連服二三帖則血塊與痢積蕩盡矣又不損產母氣血慎勿用寒藥以致血塊停瘀十九血崩大脫生化湯加荊芥穗一錢服十餘帖後如形色脫服加參生化湯二十產後霍亂吐瀉多是虛中感寒生化湯加砂仁生薑茯苓藿香或用六和湯二十一產後遍身疼痛多是血滯氣虛生化湯加肉桂八分韭白二十根如四肢麻木多是血虛化生湯加人參二十二產後起坐太早產戶感風作痛衣服被難近身體生化湯加肉桂獨活防風以散風二十三產後生癰疽生化湯加連翹一錢天花粉一錢綠豆粉五錢甘草節八分如噁心煩悶加乳香一錢切勿用大黃等散毒之藥二十四四肢麻木血虛甚也生化湯加浮小麥血脫血崩麻木服加參生化湯二十五目痛昏熱赤腫生化湯加荊芥切勿用芩連梔柏二十六產後因怒或偶吐血生化湯減川芎用歸身加荊芥八分犀角八分切勿用生地黃柏等藥二十七產後口噤牙關緊閉手足牽搐類中風狀生化湯加天麻羌活防風生薑二十八產後煩躁口渴生化湯加生脈散二十九產後流注宜治以參桂生化湯參桂生化湯川芎錢半當歸三錢炙草五分黃耆錢半肉桂六分人參二錢馬蹄香二錢凡漫腫疼痛未成膿成膿未潰者宜四物湯六君子湯十全大補湯之方以及陰蝕等瘡各有治法俱載流注論下故不再錄資生丹治法通開於後當歸酒洗川芎香附醋炒蒼朮元胡炒蒲黃炒赤苓桃仁熟地各一兩山萸地榆羌活五靈脂白芍甘草陳皮人參牛膝各三錢白朮木瓜青皮各三錢烏藥二兩七錢不見鐵良薑四錢乳香一錢沒藥一錢益母草二兩七錢不見鐵阿膠一兩五錢蛤粉炒大黃一斤另研蘇木三兩河水六碗黑豆三升煮熟取汁二碗絞取豆九兩烘乾為末以上俱為末先將大黃末入鍋內須用銅鍋用好米醋五六碗攬勻熬成膏又下醋熬如此三次再下紅花酒用紅花三兩炒黃色好酒三斤同煮至一斤去花取汁用將黑豆汁蘇木汁再熬成膏盆內盛之將豆末與眾藥和勻以大黃等膏調為丸如彈子大每服一丸不拘時服合藥須擇成開平除及天月二德黃道吉日誠心修合勿令婦人雞犬見之一治月經不調前後不一蔥姜酒空心下二治子死腹中凡孕婦因染熱病六七月間經傳腑臟熱極以致子死母腹墜在臍下不得分離急服三丸胎衣轉熱便生三治產難無陣痛凡胎氣已成子食母血至足月時余血成塊俗呼兒枕臨產時兒枕先破血裹其子所以難產但服丹逐其敗血斯須自生四治胎衣不下子母分解訖血入衣中因此胎衣不下令人脹滿水不進急服丹二三丸逐去衣中敗血自然下矣若腹不脹而痛手按痛減是元氣虛而不能送下也宜服無憂散方見胎前保產門五治產後寒熱似瘧凡產後虛羸血入心肺則熱入脾胃則寒所以寒熱不知者似瘧疾宜服此丹六治產後四肢浮腫敗血走五臟轉滿四肢停留四肢滲不去化為浮腫不知者呼為水腫血腫與水腫不同水腫氣急而小便澀血腫滿而四肢寒先服此丹去敗血後服利水氣藥鍾右泉女產後四肢遍身浮腫症情危急余用參朮救之腫不消後陰戶骨開潰膿愈七治橫生逆生八治產後百節痠痛敗血流入骨節而然也宜服此丹九治產後如見鬼狀敗血熱氣衝心因物觸動所以心煩躁熱言語顛狂不知者呼為瘋邪宜服此丹十治產後血暈眼見黑色三日內氣血未定還入五臟奔衝於肝醫不識者呼為暗風服此丹莫緩十一治產後口乾心悶七日以來氣血未定因三日後過食食與血結積聚在心是以煩渴醫不識者呼為胸膈壅滿宜服此丹以上俱用蔥姜酒送下十二治室女經閉不通加莪朮三分赤芍二分薑黃末五分天花粉四分同藥入酒內燉化服十三治婦女經水過期臍腹疼痛十四治產後敗血熱氣衝心心中煩躁言語顛狂十五治產後敗血衝心流入鼻竅失音不語不知者呼為脫陰脫陽然失音雖是難治殊不知當審妊婦經脈行與不行順與不順令血氣妄行沉入心孔反為不治宜服此丹十六治產後血崩或食酸鹹寒熱不一凡敗血惡露未止之際誤服利藥因此榮衛不和以崩漏形如雞肝渾身潮熱背膊拘急胸中煩悶急服此丹十七治產後瀉痢膿血此因未滿月早食酸寒冷熱堅硬之物與血相搏不得克化而然也宜服此丹十八治小便尿血如雞肝此敗血流入大小腸閉澀水穀之道而然服三丸即愈十九治胸膈氣滿嘔逆不定此血停脾胃食滿胸中所致宜服此丹此後殘缺者不知幾頁此語系原抄者注此下尚有一頁筆跡亦異不知是否為原抄者書故一併錄存待發現原書後另行刪定毓注竹葉湯產後中風痙病發熱面正赤喘而頭痛出金匱鮮竹葉四十九片葛根三錢防風桔梗桂枝人參附子炮甘草各一錢大棗五枚生薑五錢水煎服覆汗出自汗者去葛根加天花粉三錢附子五分產後血暈用鐵燒紅以醋澆之其氣入產婦鼻嗅即愈或燒乾漆熏產婦面即醒產後小便不通腹脹如鼓將鹽填臍中蔥白搗爛覆之以艾炷灸之即愈產後發熱血虛或用獨參湯或當歸補血湯大倍黃耆或生化湯加雲苓治之產後小便不通或以腎氣丸主之牛膝散治胎衣不下腹中脹急牛膝川芎蒲黃炒丹皮各二兩桂心四錢當歸一兩五錢共為細末每服五錢水煎服產後半月外血塊不散辨產後兒下地時惡露隨下則腹無塊痛而自舒暢若腹失蓋被或傷寒涼物則惡露凝結成塊虛症百出腹脹身熱骨蒸五心煩熱食少羸瘦或似瘧或月水不行或塊在兩脅作痛腸作雷鳴嘈雜眩暈身熱時作時止等症治法當遵丹溪所云欲泄真邪先補其虛用補中益氣湯送三消丸使塊消而人不弱若消塊無補非惟塊不可消盡食將日減甚至絕谷加減補中益氣湯人參白芍黃耆各一錢白朮二錢當歸二錢陳皮甘草各四分姜三片水煎送三消丸五六十丸此條原抄本脫有目無文今據竹林寺女科秘旨卷七補原題為產後惡露凝結成塊虛症百出毓注調經方論客有問於醫巫閭子曰先生嘗論調經以滋水為主不須補血何也曰女子一七而腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下天者天一之真癸者壬癸之水月者水之精以一月而盛盈盈則昃女人經水亦一月而下故名月信以時而下可有子如不以時下或過期或不及期皆為有病病則不能有子所以必須調經必須滋水為主又問曰同一紅色非血而何曰女子之所以與男子異者正為經水胎產故不同耳女子自有一系胞之處即養經之處養至一月而盈盈則虛矣以時交感故能以虛受人若有孕水即養胞則不月矣一有子此水即化為乳亦不月矣乳之色白何謂血乎至於七七四十九而天癸絕其所絕者天癸也其所流行之血不見虧不須四物湯補血必以六味丸滋水滋水兼可補血補血兼不得滋水何也蓋血乃後天飲食入胃遊溢精氣而成以為流行之用經水乃衝任所主人身有奇經八脈俱屬腎經無形之脈其沖任者乃奇經之二脈其脈起於胞中為脈之海分手太陽手太陰為表裡上為乳汁下為月水女子獨秉此水以為生生之源與男子之精同氣皆從天一之源而來潛滋暗長至一月而滿滿則溢似血而實非血也故曰男子以之藏精女子以之系胞然其泄間又借一點命門之火為主火旺而經水紅火衰則經水淡火太旺則色紫火太衰則色白所以滋水更當養火至於乾渴不通雖云火盛之極亦不宜以苦寒之劑降火只宜大補其水從天一之源養之使足則溢萬無毒藥可通之理調經之法盡此可以種子可以安胎固胎若有外邪與夫脾胃虛衰等症宜隨雜症參方調治調經地黃湯即六味飲加阿膠五味子或曰丹皮澤瀉聞能墜胎何以用之曰本經云丹皮破惡血生新血安生胎落死胎蓋用於補血藥中能補血用於破血藥中能破血故用之何如耳用於安胎藥中自能安胎澤瀉內經治酒風身熱汗出如浴惡風等症以澤瀉白朮各十分鹿銜草五分且仲景乃立方之祖用三味於八味丸中以其補腎也東垣八味稱其強陽益精補腎氣益氣力則無妨於胎明矣經水或不及期而來者是有火也只用本方滋水火自平矣如不及期而來本方多加海螵蛸柴胡芍藥如半月或十日而來綿延不已此屬氣虛急用補中益氣湯如過期而來者是火衰也本方加艾葉如遲而色淡者本方加肉桂遲而過多者本方加防風肉桂甚則升陽舉經湯此其大略其間亦有不及期而無火者有過而有火者或多寡之不同不可拘泥於一定之力當審脈之遲數視其稟賦強弱虛實俱以滋水為主隨症加減治之無不愈也凡紫與黑多屬火旺之甚然亦有虛寒而紫黑者不可不察脈而審症也至於淡白無火明矣升陽舉經湯人參黃耆升麻防風炙草虛寒加肉桂有臨期作痛者血不足也以本方加黃耆肉桂牛膝有火者加柴胡芍藥牛膝若經後作痛只用本方不必加減如或加減八味丸為妙又有經水二三月一行左脅有塊者乃肝脾鬱結之症用加味逍遙散兼服調經地黃湯大凡月經短少漸至不通者但宜調養其元氣若專攻其邪元氣反傷矣柏子仁丸可慎用慎勿以毒藥攻之柏子仁丸總不如八味丸得正但二三月不行經而左脅有塊者用地黃丸加貝母柴胡芍藥當歸兼服歸脾湯方見末卷柏子仁丸柏子仁炒牛膝澤蘭卷柏各五錢川斷二兩熟地三兩共為末煉蜜為丸婦人經水不調多有患瘰癧者以調經地黃湯加柴胡芍藥貝母桔梗無不愈者婦人多有血崩之疾當分陰陽治之夫氣血人身之陰陽也陽主升陰主降陽根陰陰根陽一升一降循經而行自無崩漏矣若陽有餘則升者勝血出上竅陽不足則降者勝血出下竅總之血隨氣升降也陽氣者風也風能上行然須東方溫風始能上行故用助風益氣湯凡氣虛不能攝血而崩者其人必面白尺脈虛大飲食無味或久病者有之助風益氣湯柴胡升麻防風羌活人參黃耆炙草荊芥炒黑阿膠煎服有陰虛而陽氣下陷陽搏於陰而崩者陰中之陽氣虛而崩者其人必面赤尺脈必鼓指有力而數飲食知味宜助風益陰湯加減助風益陰湯加減柴胡熟地山藥山萸肉丹皮茯神阿膠防風荊芥穗羌活獨活升麻煎服二方俱可治崩益氣者不可用一味血藥益陰者不可用一味氣藥分別施治無不神效至於男婦大便下血者亦以此二方治之俱效婦人帶下之疾帶者奇經八脈之一也腰臍間回身一周如束帶然八脈俱屬腎經天地間黃河如帶人身中帶脈所以統攝一身無形之水下焦腎氣虛損帶脈漏下白者為氣虛赤者為有火治法俱以補腎為主白者多赤者少有脾氣虛者六君子湯加升麻有氣虛者補中益氣湯加半夏防風肝虛者逍遙散兼六味丸補中益氣湯逍遙散見卷後膠艾湯有加當歸海螵蛸以治帶者阿膠艾葉杜仲川斷熟地黃耆柴胡防風補骨脂山萸肉煎服如赤帶用六味地黃湯加杜仲川斷阿膠柴胡防風有發熱之時經水適來適斷晝則安靜夜則譫語如見鬼狀名曰熱入血室法當用小柴胡湯加生地紅花歸尾官桂丹皮一服即愈此症多因經將行時妄動生冷所致婦人月經不通化血為水名曰血分用椒仁丸椒仁丸椒仁甘遂續斷附子當歸牽牛炒芫花酒炒郁李仁石膏礬石吳茱萸元胡五靈脂各一錢斑蝥三十隻糯米炒去頭足芫青三十粒糯米炒共為細末煉蜜為丸桐子大每服十五粒空心米飲下服後用當歸湯調理婦人有痃癖之疾痃者腹內近臍左右有筋脈可辨痛如指如臂如弦之狀硬起癖者在兩脅之間有時而痛或一塊不時上攻或有聲初如雞子漸至三四寸長或大如碗月經不調時作吞酸此乃婦人之疝切不可用消克之藥治法以逍遙散加茱連吳茱萸炒黃連蘆薈木香兼服六味地黃丸加芍藥茱連吳茱萸炒黃連貝母養正氣而疝自愈後用歸脾湯調理婦人陰中挺出如茵如蛇如雞冠甚至四五寸長或生蟲濕癢飲食無味內熱晡熱小便澀滯法宜朝用補中益氣湯倍柴胡加山梔膽草夕用六味地黃飲加柴胡茱連蘆薈後用歸脾湯調理此皆女子之疝但女子不曰疝而曰瘕如有蟲作癢者用蘆薈胡黃連為末加麝香少許將雞肝一片劈開入藥末於內納陰中蟲出即愈婦人有患寒氣自少陰腎經而入其症大小便不通或無脈口渴求飲飲水下咽少頃即吐吐之盡又渴又飲又吐食藥俱不入熱藥入口即出涼藥少頃亦出面必戴陽名曰關格關則不得出格則不得入關格之病不得其方則命盡矣若用通白湯無不獲效陶節庵改名回陽返本湯通白湯白朮一錢黃連二分人參一錢甘草五分熟附子五分炮姜五分連須蔥白二根水一盅半煎七分以水湃冷入童便半盞豬膽汁三匙一服即愈服後脈出者生暴出者死延年種子方陽不足者服後方延年種子方沙苑蒺藜微炒甘枸杞微炒南魚鰾切如豆大塊同蛤粉炒各八兩共為細末煉蜜為丸桐子大空心酒下三錢半鹿杞膏甘枸杞一斤入水內桑火煮至味盡出方止去渣將汁再熬入鹿角一斤磁罐內隔湯煮至筋箸挑一二尺高不斷如線取起候凝切片臨服酒燉化空心時服初服二錢漸至三錢大能益壽助陽生子此文原載卷首今移書末毓注跋王毓先生幼承庭訓酷愛中醫五十年代末懸壺京都曾於黃寺古剎潛心研讀岐黃十餘載其間結交京中名醫數十人先生京中執業時求醫者門庭若市踵不暇接其療效人人皆樂道也七十年代末調歸故里與余朝夕相處過從甚密每談及醫之濟人則振臂雀躍侃侃陳辭診余尤好整理醫籍以廣其傳這部絳雪丹書就是他從民間蒐集到的流傳抄本經過精心整理使其再現醫林箇中甘苦惟其獨知今書將付梓索序於余余不善醫謹為數語跋於書尾以應先生之命也辛巳年仲秋月武邑縣衛生局長魏香普識
